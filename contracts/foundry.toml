[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"

# Arc Testnet: chainId 5042002, USDC is the native gas token (18 dec),
# ERC-20 USDC interface at 0x3600...0000 uses 6 decimals.
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
